name: Basetrip
description: >-
  Basetrip is a travel intelligence platform providing APIs for country and city
  data, travel phrases, safety ratings, visa requirements, cost of living estimates,
  and health advisories. Designed to help travel apps, booking platforms, and trip
  planning tools differentiate their products and improve traveler experiences.
  The Basetrip API v3 uses API key authentication and returns JSON.
