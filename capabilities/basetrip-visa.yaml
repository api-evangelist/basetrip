naftiko: 1.0.0-alpha2
info:
  label: Basetrip API — Visa
  description: 'Basetrip API — Visa. 1 operations. Lead operation: Get Visa Requirements. Self-contained Naftiko capability
    covering one Basetrip business surface.'
  tags:
  - Basetrip
  - Visa
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BASETRIP_API_KEY: BASETRIP_API_KEY
capability:
  consumes:
  - type: http
    namespace: basetrip-visa
    baseUri: https://api.thebasetrip.com/v3
    description: Basetrip API — Visa business capability. Self-contained, no shared references.
    resources:
    - name: countries-id-visa
      path: /countries/{id}/visa
      operations:
      - name: getvisarequirements
        method: GET
        description: Get Visa Requirements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Destination country slug or alpha-2 code
          required: true
        - name: passport
          in: query
          type: string
          description: Passport country alpha-2 code
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.BASETRIP_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: basetrip-visa-rest
    port: 8080
    description: REST adapter for Basetrip API — Visa. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/countries/{id}/visa
      name: countries-id-visa
      description: REST surface for countries-id-visa.
      operations:
      - method: GET
        name: getvisarequirements
        description: Get Visa Requirements
        call: basetrip-visa.getvisarequirements
        with:
          id: rest.id
          passport: rest.passport
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: basetrip-visa-mcp
    port: 9090
    transport: http
    description: MCP adapter for Basetrip API — Visa. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-visa-requirements
      description: Get Visa Requirements
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: basetrip-visa.getvisarequirements
      with:
        id: tools.id
        passport: tools.passport
      outputParameters:
      - type: object
        mapping: $.
